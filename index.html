<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verba | English Speaking Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #141f14; --p: #f2f7f2; --p2: #e6f0e6; --g: #2d7a3a; --g2: #3d9e4e; --bd: rgba(45,122,58,.15); --sh: rgba(20,31,20,.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--p); color: var(--ink); line-height: 1.5; }
        
        header { 
            background: #fff; padding: 0 40px; border-bottom: 1px solid var(--bd); 
            display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; height: 72px; 
        }
        .logo { font-family: 'Playfair Display'; font-size: 32px; font-weight: 700; }
        .logo span { color: var(--g); }

        .screen { display: none; min-height: calc(100vh - 72px); width: 100%; }
        .screen.active { display: flex; flex-direction: column; }

        /* DESKTOP GRID (STAYS THE SAME) */
        .auth-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; width: 100%; flex: 1; }
        .auth-left { background: var(--ink); padding: 60px 80px; color: #fff; display: flex; flex-direction: column; justify-content: center; }
        .auth-right { padding: 60px 80px; background: #fff; display: flex; flex-direction: column; justify-content: center; }
        
        .hero-title { font-family: 'Playfair Display'; font-size: 64px; line-height: 1.1; margin-bottom: 20px; }
        .hero-title em { font-style: italic; color: var(--g2); }
        
        /* MOBILE RESPONSIVENESS */
        @media (max-width: 900px) {
            header { padding: 0 20px; height: 64px; }
            .logo { font-size: 26px; }
            .auth-grid { grid-template-columns: 1fr; }
            .auth-left { padding: 40px 20px; text-align: center; }
            .auth-right { padding: 40px 20px; border-radius: 30px 30px 0 0; margin-top: -30px; }
            .hero-title { font-size: 38px; }
            .dashboard-grid { grid-template-columns: 1fr !important; }
        }

        .tabs { display: flex; background: var(--p2); padding: 5px; border-radius: 14px; margin-bottom: 30px; }
        .tab { flex: 1; padding: 12px; border: none; background: none; font-weight: 700; cursor: pointer; border-radius: 10px; }
        .tab.active { background: #fff; color: var(--g); box-shadow: 0 4px 12px var(--sh); }

        input { width: 100%; padding: 16px; border: 1.5px solid var(--bd); border-radius: 12px; background: var(--p); margin-bottom: 20px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: var(--g); color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; width: 100%; }
        .dashboard-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        
        .card { background: #fff; padding: 30px; border-radius: 24px; border: 1px solid var(--bd); box-shadow: 0 10px 30px var(--sh); margin-bottom: 25px; }
        .mode-card { background: #fff; border: 1px solid var(--bd); padding: 20px; border-radius: 18px; cursor: pointer; margin-bottom: 15px; }
        .opt { width: 100%; padding: 16px; margin-bottom: 12px; border: 1.5px solid var(--bd); border-radius: 12px; background: var(--p); text-align: left; cursor: pointer; font-size: 16px; }

        /* SPEECH RECOGNITION UI */
        #mic-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--g); border: none; color: #fff; font-size: 28px; cursor: pointer; margin: 20px auto; display: block; }
        #mic-btn.recording { background: #e74c3c; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(231,76,60,0.6); } 70% { box-shadow: 0 0 0 20px rgba(231,76,60,0); } 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); } }
        
        .transcript-box { padding: 15px; background: var(--p); border-radius: 12px; margin: 15px 0; min-height: 80px; font-size: 15px; border: 1px dashed var(--g); line-height: 1.6; }
        .practice-img { width: 100%; border-radius: 15px; margin-bottom: 20px; }
        
        .step { display: flex; align-items: center; gap: 15px; padding: 15px; background: var(--p); border-radius: 14px; margin-bottom: 10px; }
        .step.active { border-color: var(--g); background: #fff; }
        .s-num { width: 32px; height: 32px; border-radius: 50%; background: var(--g); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
    </style>
</head>
<body>

<header><div class="logo">Verba<span>.</span></div></header>

<div id="auth-screen" class="screen active">
    <div class="auth-grid">
        <div class="auth-left">
            <h1 class="hero-title">Your voice.<br><em>Out loud.</em></h1>
            <p style="opacity:0.7">Personalized English practice. Start speaking instantly.</p>
        </div>
        <div class="auth-right">
            <div class="tabs">
                <button id="t-login" class="tab active" onclick="setMode('login')">Sign in</button>
                <button id="t-signup" class="tab" onclick="setMode('signup')">Sign up</button>
            </div>
            <input type="text" id="user-in" placeholder="Username">
            <input type="password" id="pass-in" placeholder="Password">
            <button class="btn" onclick="submitAuth()">Continue →</button>
        </div>
    </div>
</div>

<div id="quiz-screen" class="screen">
    <div class="container"><div class="card"><p id="q-cat" style="color:var(--g); font-weight:700; font-size:12px; margin-bottom:10px;"></p><h2 id="q-txt" style="margin-bottom:30px; font-family:'Playfair Display';"></h2><div id="q-opts"></div></div></div>
</div>

<div id="dashboard" class="screen">
    <div class="container">
        <h1 style="font-family:'Playfair Display'; margin-bottom:30px;">Hi, <span id="u-display">Learner</span></h1>
        <div class="dashboard-grid">
            <div>
                <div class="mode-card" onclick="openMode('Free Monologue')"><h3>🎙️ Free Monologue</h3><p>Speak freely with AI analysis.</p></div>
                <div class="mode-card" onclick="openMode('Picture Description')"><h3>🖼️ Picture Description</h3><p>IELTS scene practice.</p></div>
                <div class="mode-card" onclick="openMode('Read Aloud')"><h3>📖 Read Aloud</h3><p>Text clarity drills.</p></div>
            </div>
            <div class="card"><h4>Learning Path</h4><div id="path-box" style="margin-top:20px;"></div></div>
        </div>

        <div id="ai-panel" class="card" style="display:none; margin-top:30px; text-align:center;">
            <h3 id="mode-title"></h3>
            <div id="mode-content"></div>
            <div class="transcript-box" id="transcript"><em>Tap the mic and begin speaking...</em></div>
            <button id="mic-btn" onclick="toggleSpeech()">🎤</button>
            <div id="fb-box" style="margin-top:20px; padding:20px; background:var(--p2); border-radius:12px; display:none; text-align:left;">
                <strong style="color:var(--g)">AI Feedback:</strong>
                <p id="fb-txt" style="font-size:14px; margin-top:10px;"></p>
            </div>
        </div>
    </div>
</div>

<script>
    let authMode = 'login'; let qIdx = 0; let progress = 1; let recognition;
    const QUIZ = [
        {c:"Grammar", q:"I ___ home yesterday.", o:["go","went","gone"], a:1},
        {c:"Vocab", q:"Synonym of 'Robust'?", o:["Weak","Strong","Thin"], a:1},
        {c:"Logic", q:"'Vague' means...", o:["Clear","Not clear","True"], a:1},
        {c:"Grammar", q:"If I ___ time, I'd go.", o:["have","had","having"], a:1},
        {c:"Business", q:"Formal closing?", o:["Sincerely","Later","Sup"], a:0},
        {c:"Grammar", q:"I ___ English for years.", o:["study","studying","studied"], a:2},
        {c:"Vocab", q:"To 'shelve' is to...", o:["Finish","Delay","Start"], a:1},
        {c:"Grammar", q:"By next year, I ___.", o:["finish","will finish","will have finished"], a:2},
        {c:"Logic", q:"'Inevitable' is...", o:["Possible","Unavoidable","Rare"], a:1},
        {c:"Business", q:"Best intro?", o:["To whom...","Hey","What's up"], a:0}
    ];

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';
        recognition.onresult = (e) => {
            let t = ''; for (let i = e.resultIndex; i < e.results.length; ++i) t += e.results[i][0].transcript;
            document.getElementById('transcript').innerText = t;
        };
    }

    function setMode(m) { authMode = m; document.getElementById('t-login').className = m==='login'?'tab active':'tab'; document.getElementById('t-signup').className = m==='signup'?'tab active':'tab'; }
    function submitAuth() { 
        document.getElementById('u-display').innerText = document.getElementById('user-in').value || "Learner";
        if(authMode==='signup') { show('quiz-screen'); renderQuiz(); } else { show('dashboard'); renderPath(); }
    }
    function renderQuiz() {
        const d = QUIZ[qIdx]; document.getElementById('q-cat').innerText = `Question ${qIdx+1}/10`; document.getElementById('q-txt').innerText = d.q;
        const o = document.getElementById('q-opts'); o.innerHTML = '';
        d.o.forEach((t, i) => { const b = document.createElement('button'); b.className='opt'; b.innerText=t; b.onclick=()=>{ qIdx++; if(qIdx<QUIZ.length)renderQuiz(); else { show('dashboard'); renderPath(); }}; o.appendChild(b); });
    }
    function openMode(m) {
        document.getElementById('ai-panel').style.display='block'; document.getElementById('mode-title').innerText = m;
        const c = document.getElementById('mode-content');
        c.innerHTML = m === 'Picture Description' ? `<img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=600&q=80" class="practice-img">` : '';
        document.getElementById('fb-box').style.display='none';
        window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'});
    }
    function toggleSpeech() {
        const btn = document.getElementById('mic-btn');
        if (!recognition) return alert("Speech recognition not supported.");
        if (btn.classList.contains('recording')) {
            recognition.stop(); btn.classList.remove('recording');
            document.getElementById('fb-box').style.display='block';
            document.getElementById('fb-txt').innerText = "AI Analysis: Your flow is natural. Focus on the word endings in 'foundation'. Current score: 7.0/9.";
            progress++; renderPath();
        } else {
            recognition.start(); btn.classList.add('recording');
        }
    }
    function renderPath() {
        const w = document.getElementById('path-box'); w.innerHTML = '';
        ["Placement", "Basics", "Fluency", "Mastery"].forEach((s, i) => {
            const act = i < progress;
            w.innerHTML += `<div class="step ${act?'active':''}"><div class="s-num">${act?'✓':i+1}</div><strong>${s}</strong></div>`;
        });
    }
    function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
</script>
</body>
</html>
