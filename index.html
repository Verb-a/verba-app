<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Verba</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#141f14;--ink2:#253325;--ink3:#4a6b4a;
  --p:#f2f7f2;--p2:#e6f0e6;--p3:#d4e8d4;--p4:#b8d4b8;
  --g:#2d7a3a;--g2:#3d9e4e;--g3:#52c065;
  --gd:rgba(45,122,58,.12);--gd2:rgba(45,122,58,.22);
  --gold:#7a6010;--gold2:#b89020;--goldd:rgba(122,96,16,.13);
  --teal:#1a6a5c;--teald:rgba(26,106,92,.11);
  --muted:#6b8a6b;--bd:rgba(45,122,58,.11);--bd2:rgba(45,122,58,.2);
  --sh:rgba(20,31,20,.09);--r:12px;--r2:18px;--r3:24px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--p);color:var(--ink);min-height:100vh;overflow-x:hidden;}
.screen{display:none;position:relative;z-index:1;min-height:100vh;}
.screen.active{display:block;}

/* NAV */
#nav{position:sticky;top:0;z-index:100;background:rgba(242,247,242,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd2);padding:0 24px;display:flex;align-items:center;height:60px;gap:8px;}
.nlogo{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--ink);margin-right:auto;}
.nbtn{background:none;border:none;color:var(--ink3);font-size:13px;font-weight:500;padding:6px 13px;border-radius:8px;cursor:pointer;}
.nbtn.act{background:var(--p3);color:var(--g);font-weight:600;}

/* AUTH */
#auth{display:flex;flex-direction:column;min-height:100vh;background:#fff;}
.auth-body{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;}
.auth-left{background:var(--ink);padding:44px;display:flex;flex-direction:column;justify-content:center;color:#fff;}
.auth-right{padding:44px;display:flex;flex-direction:column;justify-content:center;}
.atabs{display:flex;background:var(--p2);border-radius:10px;padding:3px;margin-bottom:24px;}
.atab{flex:1;padding:9px;border:none;background:none;border-radius:8px;font-family:'Outfit';cursor:pointer;color:var(--muted);}
.atab.act{background:#fff;color:var(--g);font-weight:700;box-shadow:0 1px 4px var(--sh);}
.apanel{display:none;}
.apanel.act{display:block;}
.fgrp{margin-bottom:16px;}
.flabel{font-size:12px;font-weight:600;margin-bottom:6px;display:block;}
.finput{width:100%;padding:12px;border:1.5px solid var(--bd2);border-radius:10px;outline:none;}
.btn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--g);color:#fff;font-weight:600;cursor:pointer;}

/* QUIZ VISUALS */
#quiz{padding:60px 24px;text-align:center;}
.qcard{background:#fff;border-radius:var(--r2);border:1px solid var(--bd);box-shadow:0 4px 24px var(--sh);max-width:600px;margin:24px auto;padding:32px;}
.qtext{font-family:'Playfair Display';font-size:20px;margin-bottom:20px;}
.qopt{display:block;width:100%;padding:14px;margin-bottom:10px;border:1.5px solid var(--bd2);border-radius:10px;background:var(--p);cursor:pointer;text-align:left;font-family:'Outfit';}
.qopt:hover{border-color:var(--g);background:var(--gd);}

/* HOME */
.hbanner{background:var(--ink);padding:40px 24px;color:#fff;}
.hbody{max-width:900px;margin:0 auto;padding:24px;}
.hcard{background:#fff;border-radius:var(--r2);border:1px solid var(--bd);padding:24px;margin-bottom:20px;}
.examb{background:var(--gold);color:#fff;border:none;border-radius:9px;padding:12px 20px;font-weight:700;cursor:pointer;}
.examb:disabled{background:var(--p3);color:var(--muted);cursor:not-allowed;}
</style>
</head>
<body>

  <div id="nav" style="display:none;">
    <div class="nlogo">Verba</div>
    <button class="nbtn act">Home</button>
    <button class="nbtn" onclick="logout()">Logout</button>
  </div>

  <div id="auth" class="screen active">
    <div class="auth-body">
      <div class="auth-left">
        <h1 style="font-family:'Playfair Display';font-size:48px;">Master your <em>fluency</em>.</h1>
      </div>
      <div class="auth-right">
        <div style="max-width:360px;margin:0 auto;width:100%;">
          <div class="atabs">
            <button id="tab-login" class="atab act" onclick="toggleAuth('login')">Login</button>
            <button id="tab-signup" class="atab" onclick="toggleAuth('signup')">Create Account</button>
          </div>
          
          <div id="lPanel" class="apanel act">
            <div class="fgrp">
              <label class="flabel">Email</label>
              <input type="email" class="finput" placeholder="name@example.com">
            </div>
            <button class="btn" onclick="doLogin()">Sign In</button>
          </div>

          <div id="sPanel" class="apanel">
            <div class="fgrp">
              <label class="flabel">Full Name</label>
              <input type="text" id="regName" class="finput" placeholder="John Doe">
            </div>
            <div class="fgrp">
              <label class="flabel">Email</label>
              <input type="email" class="finput" placeholder="name@example.com">
            </div>
            <button class="btn" onclick="doSignup()">Create Account</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="quiz" class="screen">
    <h2 style="font-family:'Playfair Display';font-size:32px;">Placement Quiz</h2>
    <p style="color:var(--muted)">Let's find the right level for you.</p>
    <div class="qcard">
      <div class="qtext">Which of these best describes your goal?</div>
      <button class="qopt" onclick="finishQuiz('A1')"><b>Beginner:</b> I want to learn the basics.</button>
      <button class="qopt" onclick="finishQuiz('B2')"><b>Intermediate:</b> I want to speak fluently at work.</button>
      <button class="qopt" onclick="finishQuiz('C1')"><b>Advanced:</b> I want to master complex debates.</button>
    </div>
  </div>

  <div id="home" class="screen">
    <div class="hbanner">
      <h2 id="welcomeMsg">Welcome!</h2>
      <p>Your Current XP: <span id="xpCount">0</span></p>
    </div>
    <div class="hbody">
      <div class="hcard">
        <h3 style="margin-bottom:12px;">Level Progress</h3>
        <p style="font-size:14px;color:var(--muted);margin-bottom:20px;">
          Collect 500 XP to unlock your first Level Exam.
        </p>
        <button id="levelExamBtn" class="examb" disabled>Level Exam Locked</button>
        <button class="btn" style="margin-top:10px;background:var(--ink);" onclick="addXP()">Simulate Adding 100 XP</button>
      </div>
    </div>
  </div>

<script>
let user = { xp: 0, name: "" };

// Issue 1: Account menu toggle logic
function toggleAuth(mode) {
  document.querySelectorAll('.atab').forEach(t => t.classList.remove('act'));
  document.querySelectorAll('.apanel').forEach(p => p.classList.remove('act'));
  
  if(mode === 'login') {
    document.getElementById('tab-login').classList.add('act');
    document.getElementById('lPanel').classList.add('act');
  } else {
    document.getElementById('tab-signup').classList.add('act');
    document.getElementById('sPanel').classList.add('act');
  }
}

// Issue 2: Sequence Fix - Signup leads to Quiz
function doSignup() {
  const nameInput = document.getElementById('regName').value;
  if(!nameInput) return alert("Please enter your name");
  user.name = nameInput;
  showScreen('quiz');
}

function doLogin() {
  user.name = "User";
  showScreen('home');
}

function finishQuiz(level) {
  alert("Level set to " + level);
  showScreen('home');
  document.getElementById('welcomeMsg').innerText = "Welcome, " + user.name + "!";
}

// Issue 3: Level exam activation logic
function addXP() {
  user.xp += 100;
  document.getElementById('xpCount').innerText = user.xp;
  
  const examBtn = document.getElementById('levelExamBtn');
  if(user.xp >= 500) {
    examBtn.disabled = false;
    examBtn.innerText = "Start Level Exam";
    examBtn.style.background = "var(--g2)";
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('nav').style.display = (id === 'auth') ? 'none' : 'flex';
}

function logout() {
  user.xp = 0;
  document.getElementById('xpCount').innerText = 0;
  showScreen('auth');
}
</script>
</body>
</html>
